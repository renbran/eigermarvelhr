<style>
.hr-platform-embed {
    position: relative;
    width: 100%;
    margin: 0 auto;
    padding: 0;
}

.hr-platform-iframe-wrapper {
    position: relative;
    width: 100%;
    height: 0;
    padding-bottom: 100vh;
    overflow: hidden;
    background: #ffffff;
}

.hr-platform-iframe-wrapper iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 0;
}

.hr-platform-loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 1;
}

.hr-platform-loading .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(0, 0, 0, 0.1);
    border-top-color: #1a73e8;
    border-radius: 50%;
    animation: hr-spin 0.8s linear infinite;
    margin: 0 auto 12px;
}

.hr-platform-loading p {
    color: #5f6368;
    font-size: 14px;
}

@keyframes hr-spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.hr-platform-iframe-wrapper.loaded .hr-platform-loading {
    display: none;
}

@media (max-width: 768px) {
    .hr-platform-iframe-wrapper {
        padding-bottom: 120vh;
    }
}

@media (min-width: 1025px) {
    .hr-platform-iframe-wrapper {
        padding-bottom: 90vh;
    }
}
</style>

<div class="hr-platform-embed">
    <div class="hr-platform-iframe-wrapper" id="hrPlatformWrapper">
        <div class="hr-platform-loading">
            <div class="spinner"></div>
            <p>Loading Platform...</p>
        </div>
        
        <iframe 
            id="hrPlatformFrame"
            src="https://eigermarvel.netlify.app"
            title="HR Platform"
            width="100%"
            height="100%"
            frameborder="0"
            allowfullscreen="true">
        </iframe>
    </div>
</div>

<script>
(function() {
    var wrapper = document.getElementById('hrPlatformWrapper');
    var iframe = document.getElementById('hrPlatformFrame');
    
    if (wrapper &amp;&amp; iframe) {
        iframe.onload = function() {
            wrapper.className = wrapper.className + ' loaded';
        };
    }
})();
</script>
