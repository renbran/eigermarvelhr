name: Sync to renbran (Vercel)

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Mirror main to renbran/eiger-marvel-hr-plat
    steps:
      - name: Checkout samana
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.RENBRAN_SSH_KEY }}

      - name: Push to renbran via SSH
        run: |
          git remote add renbran git@github.com:renbran/eiger-marvel-hr-plat.git
          git push renbran main
