<!DOCTYPE html>
<html lang="en-AE">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Not Found — Eiger Marvel</title>
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://eigermarvelhr.com/404" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root {
        --gold: #d4af37;
        --bg-900: #0a0a0a;
        --bg-800: #121212;
        --text-100: #f5f5f5;
        --text-300: #c9c9c9;
      }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: Inter, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        color: var(--text-100);
        background: var(--bg-900);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container { text-align: center; padding: 48px 24px; max-width: 520px; }
      h1 { font-size: 120px; line-height: 1; margin: 0 0 8px; color: var(--gold); font-weight: 700; letter-spacing: -0.03em; }
      h2 { font-size: 24px; font-weight: 600; margin: 0 0 16px; color: var(--text-100); }
      p { font-size: 16px; line-height: 1.6; color: var(--text-300); margin: 0 0 32px; }
      .btn {
        display: inline-block;
        padding: 14px 32px;
        border-radius: 8px;
        font-weight: 600;
        background: var(--gold);
        color: #0a0a0a;
        text-decoration: none;
        transition: opacity 0.15s ease;
      }
      .btn:hover { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p>The page you're looking for doesn't exist or has been moved.<br />Let's get you back on track.</p>
      <a href="/" class="btn">Back to Eiger Marvel</a>
    </div>
  </body>
</html>
