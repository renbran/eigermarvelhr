# GitHub Pages Configuration for Eiger Marvel HR Platform
# This enables GitHub Pages to serve your website directly from the repository

# Basic Settings
title: "Eiger Marvel - Workforce 360°"
description: "All-in-One Recruitment, Payroll & WPS Compliance Solutions for UAE"
baseurl: "" # Leave empty if deploying to root domain
url: "https://renbran.github.io" # Your GitHub Pages URL (update after deployment)

# Build Settings
markdown: kramdown
exclude:
  - README.md
  - .vscode/
  - .claude-dev-helper/
  - node_modules/
  - package.json
  - package-lock.json
  - Gemfile
  - Gemfile.lock

# Include all HTML, CSS, JS files
include:
  - index.html
  - css/
  - js/
  - assets/
  - pages/
  - sections/

# Plugins (GitHub Pages safe plugins)
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
